name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v0.1.0
        required: true
        default: v0.1.0
      prerelease:
        description: Mark the GitHub Release as a prerelease
        required: true
        type: boolean
        default: true
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build unsigned preview release
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Clear prior local artifacts
        run: rm -f artifacts/OuroWorkbench-*.zip artifacts/OuroWorkbench-*.manifest.json artifacts/release-notes.md

      - name: Run release preflight
        run: scripts/preflight.sh

      - name: Generate release notes
        run: scripts/generate-release-notes.sh > artifacts/release-notes.md

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < VERSION)"
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            tag="$GITHUB_REF_NAME"
            prerelease="true"
          else
            tag="$INPUT_TAG"
            prerelease="${INPUT_PRERELEASE:-true}"
          fi
          args=(
            release create "$tag"
            artifacts/OuroWorkbench-*.zip
            artifacts/OuroWorkbench-*.manifest.json
            --repo "$GITHUB_REPOSITORY"
            --target "$GITHUB_SHA"
            --title "Ouro Workbench $version"
            --notes-file artifacts/release-notes.md
          )
          if [[ "$prerelease" == "true" ]]; then
            args+=(--prerelease)
          fi
          gh "${args[@]}"
