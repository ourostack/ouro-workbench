name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v0.1.0
        required: true
        default: v0.1.0
      prerelease:
        description: Mark the GitHub Release as a prerelease
        required: true
        type: boolean
        default: true
  # Callable by the auto-release-on-merge workflow.
  workflow_call:
    inputs:
      tag:
        description: Release tag, for example v0.1.0
        required: true
        type: string
      prerelease:
        description: Mark the GitHub Release as a prerelease
        required: false
        type: boolean
        default: true
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build ad-hoc-signed preview release
    runs-on: macos-14
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify pinned macOS runner policy
        run: python3 .github/scripts/check-macos-runner-policy.py

      - name: Select newest Xcode
        run: |
          latest="$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)"
          [ -n "$latest" ] || latest="$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
          sudo xcode-select -s "$latest/Contents/Developer"
          swift --version
          xcodebuild -version

      - name: Verify shared shell dependency freshness
        run: scripts/check-shell-dependency.sh

      - name: Verify release freshness policy
        env:
          GH_TOKEN: ${{ github.token }}
        run: scripts/release-policy.sh freshness --mode main

      - name: Resolve dependencies
        run: swift package resolve

      - name: Clear prior local artifacts
        run: rm -f artifacts/*.zip artifacts/*.manifest.json artifacts/release-notes.md

      - name: Run release preflight
        env:
          GH_TOKEN: ${{ github.token }}
        run: scripts/preflight.sh

      - name: Generate release notes
        run: scripts/generate-release-notes.sh > artifacts/release-notes.md

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < VERSION)"
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            tag="$GITHUB_REF_NAME"
            prerelease="true"
          else
            tag="$INPUT_TAG"
            prerelease="${INPUT_PRERELEASE:-true}"
          fi
          # Idempotent: never double-publish a tag. Safe under the merge-driven
          # auto-release, a manual tag push, and workflow re-runs.
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $tag already exists; skipping publish."
            exit 0
          fi
          args=(
            release create "$tag"
            artifacts/*.zip
            artifacts/*.manifest.json
            --repo "$GITHUB_REPOSITORY"
            --target "$GITHUB_SHA"
            --title "Ouro Workbench $version"
            --notes-file artifacts/release-notes.md
          )
          if [[ "$prerelease" == "true" ]]; then
            args+=(--prerelease)
          fi
          gh "${args[@]}"

      - name: Verify published release and installer
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < VERSION)"
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            tag="$GITHUB_REF_NAME"
            prerelease="true"
          else
            tag="$INPUT_TAG"
            prerelease="${INPUT_PRERELEASE:-true}"
          fi
          scripts/verify-published-release.sh \
            --tag "$tag" \
            --version "$version" \
            --sha "$GITHUB_SHA" \
            --prerelease "$prerelease"
