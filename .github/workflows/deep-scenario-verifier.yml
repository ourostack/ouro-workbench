name: Deep Scenario Verifier

on:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * *"

permissions:
  contents: read

concurrency:
  group: deep-scenario-verifier
  cancel-in-progress: false

jobs:
  deep-native-scenario-verifier:
    name: Deep native scenario verifier
    runs-on: macos-14
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Verify pinned macOS runner policy
        run: python3 .github/scripts/check-macos-runner-policy.py

      - name: Select newest Xcode
        run: |
          latest="$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)"
          [ -n "$latest" ] || latest="$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
          sudo xcode-select -s "$latest/Contents/Developer"
          swift --version
          xcodebuild -version

      - name: Verify shared shell dependency freshness
        run: scripts/check-shell-dependency.sh

      - name: Resolve dependencies
        run: swift package resolve

      - name: Render 100,000 native scenario surfaces
        run: >
          swift run
          -Xswiftc -warnings-as-errors
          -Xswiftc -strict-concurrency=complete
          OuroWorkbenchScenarioVerifier
          --out artifacts/workbench-scenario-verifier-deep
          --no-samples
          --deep-scenarios 15000
          --seed 20260525
          --expect-rows 20000
          --expect-matrix-rows 5000
          --expect-deep-rows 15000
          --expect-render-passes 100000
          --expect-coverage-digest d205bd5c250d80ca

      - name: Upload deep scenario verifier summary
        uses: actions/upload-artifact@v7
        with:
          name: workbench-scenario-verifier-deep-${{ github.sha }}
          path: artifacts/workbench-scenario-verifier-deep
          if-no-files-found: error
          retention-days: 30
