name: Auto Release on main

# Cut a GitHub Release automatically when main advances to a VERSION that
# hasn't been released yet. VERSION is bumped in every PR, so each merge that
# changes it publishes exactly one prerelease build; merges that don't change
# VERSION (e.g. docs-only) are no-ops. Idempotent — re-running never
# double-publishes (the reusable Release workflow guards on the existing tag).

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: auto-release
  cancel-in-progress: false

jobs:
  decide:
    name: Decide whether to release
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < VERSION)"
          tag="v${version}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            released_sha="$(gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json targetCommitish --jq .targetCommitish)"
            if ! changed_files="$(git diff --name-only "$released_sha" "$GITHUB_SHA")"; then
              echo "::error::Could not compare existing release $tag ($released_sha) to $GITHUB_SHA; refusing to skip auto-release."
              exit 1
            fi
            if printf '%s\n' "$changed_files" | grep -E '^(Sources/|Resources/|scripts/|Package[.]swift$|Package[.]resolved$|VERSION$)' >/dev/null; then
              {
                echo "::error::Release $tag already exists at $released_sha, but this push changes releasable app inputs."
                echo "::error::Bump VERSION and WorkbenchRelease.version before merging runtime/package changes so auto-update has a new public release to install."
              }
              exit 1
            fi
            echo "Release $tag already exists and this push has no releasable app input changes; nothing to do."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION $version has no release yet; will publish $tag."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  release:
    name: Build and publish release
    needs: decide
    if: needs.decide.outputs.should_release == 'true'
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.decide.outputs.tag }}
      prerelease: true
    permissions:
      contents: write
