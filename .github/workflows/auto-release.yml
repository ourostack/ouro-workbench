name: Auto Release on main

# Cut a GitHub Release automatically when main advances to a VERSION that
# hasn't been released yet. VERSION is bumped in every PR, so each merge that
# changes it publishes exactly one prerelease build; merges that don't change
# VERSION (e.g. docs-only) are no-ops. Idempotent — re-running never
# double-publishes (the reusable Release workflow guards on the existing tag).

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: auto-release
  cancel-in-progress: false

jobs:
  decide:
    name: Decide whether to release
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < VERSION)"
          tag="v${version}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          if [[ "$(scripts/release-policy.sh release-exists --version "$version")" == "true" ]]; then
            scripts/release-policy.sh freshness --mode main
            echo "Release $tag already exists and this push has no releasable app input changes; nothing to do."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            scripts/release-policy.sh freshness --mode main
            echo "VERSION $version has no release yet; will publish $tag."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  release:
    name: Build and publish release
    needs: decide
    if: needs.decide.outputs.should_release == 'true'
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.decide.outputs.tag }}
      prerelease: true
    secrets: inherit
    permissions:
      contents: write
