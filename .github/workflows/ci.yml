name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  swift-test:
    name: Swift tests
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Verify generated scenario matrix
        run: |
          scripts/generate-workbench-5000-matrix.rb
          git diff --exit-code -- docs/workbench-5000-scenario-matrix.tsv docs/workbench-5000-scenario-matrix.md

      - name: Resolve dependencies
        run: swift package resolve

      - name: Run tests
        run: swift test

  native-scenario-verifier:
    name: Native scenario verifier
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Render 25,000 native scenario surfaces
        run: >
          swift run OuroWorkbenchScenarioVerifier
          --out artifacts/workbench-scenario-verifier
          --no-samples
          --expect-rows 5000
          --expect-matrix-rows 5000
          --expect-deep-rows 0
          --expect-render-passes 25000
          --expect-coverage-digest 567dc7ec0c45835b

      - name: Upload native scenario verifier summary
        uses: actions/upload-artifact@v7
        with:
          name: workbench-scenario-verifier-${{ github.sha }}
          path: artifacts/workbench-scenario-verifier
          if-no-files-found: error
          retention-days: 14

  app-bundle:
    name: App bundle
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Package app bundle
        run: scripts/package-app.sh

      - name: Verify app bundle
        run: scripts/verify-app-bundle.sh

      - name: Smoke install rollback
        run: scripts/smoke-install-rollback.sh

      - name: Archive app bundle
        run: |
          mkdir -p artifacts
          ditto -c -k --keepParent "dist/Ouro Workbench.app" artifacts/OuroWorkbenchApp.zip

      - name: Upload app bundle
        uses: actions/upload-artifact@v7
        with:
          name: ouro-workbench-app-${{ github.sha }}
          path: artifacts/OuroWorkbenchApp.zip
          if-no-files-found: error
          retention-days: 7
