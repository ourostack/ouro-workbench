name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  swift-test:
    name: Swift tests
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Run tests
        run: swift test

  native-scenario-verifier:
    name: Native scenario verifier
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Render 25,000 native scenario surfaces
        run: >
          swift run OuroWorkbenchScenarioVerifier
          --out artifacts/workbench-scenario-verifier
          --no-samples
          --expect-rows 5000
          --expect-matrix-rows 5000
          --expect-deep-rows 0
          --expect-render-passes 25000
          --expect-coverage-digest 567dc7ec0c45835b

      - name: Upload native scenario verifier summary
        uses: actions/upload-artifact@v7
        with:
          name: workbench-scenario-verifier-${{ github.sha }}
          path: artifacts/workbench-scenario-verifier
          if-no-files-found: error
          retention-days: 14
