name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  swift-test:
    name: Swift tests
    runs-on: macos-14
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify pinned macOS runner policy
        run: python3 .github/scripts/check-macos-runner-policy.py

      - name: Select newest Xcode
        run: |
          latest="$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)"
          [ -n "$latest" ] || latest="$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
          sudo xcode-select -s "$latest/Contents/Developer"
          swift --version
          xcodebuild -version

      - name: Verify release version contract
        run: scripts/verify-version-contract.sh

      - name: Verify release freshness policy
        env:
          GH_TOKEN: ${{ github.token }}
        run: scripts/release-policy.sh freshness

      - name: Verify release policy PR base handling
        run: scripts/release-policy.sh selftest-pr-base

      - name: Verify release package guard
        run: scripts/release-policy.sh selftest-package-guards

      - name: Verify shared shell dependency freshness
        run: scripts/check-shell-dependency.sh

      - name: Verify shared shell boundary
        run: scripts/check-shell-boundary.sh

      - name: Verify shell dependency watch automation
        run: scripts/release-policy.sh selftest-shell-dependency-watch

      - name: Verify release policy path classification
        run: scripts/release-policy.sh selftest-paths

      - name: Verify generated scenario matrix
        run: |
          scripts/generate-workbench-5000-matrix.rb
          git diff --exit-code -- docs/workbench-5000-scenario-matrix.tsv docs/workbench-5000-scenario-matrix.md

      - name: Resolve dependencies
        run: swift package resolve

      - name: Run tests
        run: swift test -Xswiftc -warnings-as-errors -Xswiftc -strict-concurrency=complete

  native-scenario-verifier:
    name: Native scenario verifier
    runs-on: macos-14
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Select newest Xcode
        run: |
          latest="$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)"
          [ -n "$latest" ] || latest="$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
          sudo xcode-select -s "$latest/Contents/Developer"
          swift --version
          xcodebuild -version

      - name: Verify shared shell dependency freshness
        run: scripts/check-shell-dependency.sh

      - name: Resolve dependencies
        run: swift package resolve

      - name: Render 25,000 native scenario surfaces
        run: >
          swift run
          -Xswiftc -warnings-as-errors
          -Xswiftc -strict-concurrency=complete
          OuroWorkbenchScenarioVerifier
          --out artifacts/workbench-scenario-verifier
          --no-samples
          --expect-rows 5000
          --expect-matrix-rows 5000
          --expect-deep-rows 0
          --expect-render-passes 25000
          --expect-coverage-digest 89292786bde2e133

      - name: Upload native scenario verifier summary
        uses: actions/upload-artifact@v7
        with:
          name: workbench-scenario-verifier-${{ github.sha }}
          path: artifacts/workbench-scenario-verifier
          if-no-files-found: error
          retention-days: 14

  app-bundle:
    name: App bundle
    runs-on: macos-14
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Select newest Xcode
        run: |
          latest="$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)"
          [ -n "$latest" ] || latest="$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
          sudo xcode-select -s "$latest/Contents/Developer"
          swift --version
          xcodebuild -version

      - name: Verify shared shell dependency freshness
        run: scripts/check-shell-dependency.sh

      - name: Resolve dependencies
        run: swift package resolve

      - name: Run native UI surface probe
        run: swift run -Xswiftc -warnings-as-errors -Xswiftc -strict-concurrency=complete OuroWorkbench --uisurfacetest

      - name: Run keyboard and accessibility contract probe
        run: swift run -Xswiftc -warnings-as-errors -Xswiftc -strict-concurrency=complete OuroWorkbench --keyboarda11ycontract

      - name: Verify GUI smoke timeout guard
        run: scripts/smoke-verify-app-timeout.sh

      - name: Verify MCP tool catalog matches advertised tools
        run: scripts/smoke-mcp-tool-catalog.sh

      - name: Verify package shallow checkout guard
        run: scripts/smoke-package-shallow-guard.sh

      - name: Verify latest artifact installer help
        run: scripts/install-latest-app-artifact.sh --help

      - name: Verify latest release installer help
        run: scripts/install-latest-release.sh --help

      - name: Verify latest release resolver help
        run: scripts/resolve-latest-release-tag.sh --help

      - name: Verify published release verifier help
        run: scripts/verify-published-release.sh --help

      - name: Verify latest release installer resolves prereleases
        run: scripts/selftest-latest-release-installer.sh

      - name: Verify support diagnostics help
        run: scripts/collect-support-diagnostics.sh --help

      - name: Verify release notes generator
        run: scripts/generate-release-notes.sh >/dev/null

      - name: Package app bundle
        run: scripts/package-app.sh

      - name: Verify app bundle
        run: scripts/verify-app-bundle.sh

      - name: Smoke install rollback
        run: scripts/smoke-install-rollback.sh

      - name: Archive app bundle
        run: scripts/archive-app-artifact.sh

      - name: Verify app artifact
        run: scripts/smoke-app-artifact-verifier.sh

      - name: Smoke install from artifact
        run: scripts/smoke-install-from-artifact.sh

      - name: Verify artifact install uses manifest version
        run: scripts/selftest-install-app-artifact-version.sh

      - name: Verify published release verifier
        run: scripts/selftest-published-release-verifier.sh

      - name: Verify public web installer safety
        run: scripts/selftest-web-installer.sh

      - name: Upload app bundle
        uses: actions/upload-artifact@v7
        with:
          name: ouro-workbench-app-${{ github.sha }}
          path: |
            artifacts/*.zip
            artifacts/*.manifest.json
          if-no-files-found: error
          retention-days: 7

  coverage:
    name: Coverage
    runs-on: macos-14
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Select newest Xcode
        run: |
          latest="$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)"
          [ -n "$latest" ] || latest="$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
          sudo xcode-select -s "$latest/Contents/Developer"
          swift --version
          xcodebuild -version

      - name: Verify shared shell dependency freshness
        run: scripts/check-shell-dependency.sh

      - name: Resolve dependencies
        run: swift package resolve

      - name: Enforce 100% line+region coverage on OuroWorkbenchCore
        run: scripts/check-coverage.sh
